<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}DISEÑO DE SUBESTACIONES{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #f4f6f9; }
        .navbar-brand { font-weight: 700; font-size: 1.3rem; }
        .card { border: none; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
        .card-header { border-radius: 12px 12px 0 0 !important; font-weight: 600; }
        .btn-primary { background: #1f3a5f; border-color: #1f3a5f; }
        .btn-primary:hover { background: #152a45; border-color: #152a45; }
        .nav-tabs .nav-link { color: #1f3a5f; font-weight: 500; }
        .nav-tabs .nav-link.active { color: #1f3a5f; font-weight: 700; border-bottom: 3px solid #1f3a5f; }
        .footer { font-size: 0.85rem; color: #888; text-align: center; padding: 2rem 0; }
        .metric-card { text-align: center; padding: 1rem; background: #f8f9fa; border-radius: 8px; }
        .metric-card .value { font-size: 1.5rem; font-weight: 700; color: #1f3a5f; }
        .metric-card .label { font-size: 0.8rem; color: #666; }
    </style>
    {% block extra_head %}{% endblock %}
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark" style="background:#1f3a5f;">
        <div class="container">
            <a class="navbar-brand" href="/">DISEÑO DE SUBESTACIONES</a>
            {% if usuario %}
            <span class="navbar-text text-white-50 me-2">{{ usuario.nombre }}</span>
            <a href="/logout" class="btn btn-outline-light btn-sm">Salir</a>
            {% endif %}
        </div>
    </nav>
    <div class="container mt-4">
        {% block content %}{% endblock %}
    </div>
    <div class="footer">
        DISEÑO DE SUBESTACIONES &mdash; IEEE 605 / IEC 60865-1 / IEEE 998
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
